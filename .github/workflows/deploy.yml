name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build (vite)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: bun run build

      - name: Bundle worker + patch wrangler.json
        run: python3 scripts/patch-wrangler.py

      - name: Deploy (wrangler deploy with patched config)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          WORKER_CFG=$(find dist -name "wrangler.json" -not -path "*/client/*" | head -1)
          echo "Using config: $WORKER_CFG"
          cat "$WORKER_CFG"
          bunx wrangler deploy --config "$WORKER_CFG"
