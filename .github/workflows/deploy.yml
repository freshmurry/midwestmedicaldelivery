name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: bun run build

      - name: Compile user-routes.ts
        run: |
          WORKER_DIR=$(find dist -name "index.js" -not -path "*/client/*" | head -1 | xargs dirname)
          echo "Worker dir: $WORKER_DIR"
          bunx esbuild worker/user-routes.ts \
            --bundle --platform=browser --target=es2022 --format=esm \
            --external:hono --external:hono/cors --external:hono/logger \
            --external:cloudflare:workers \
            --outfile="$WORKER_DIR/user-routes.js"
          echo "Compiled user-routes.js to $WORKER_DIR"

      - name: Patch dist wrangler.json (AI binding + additional_modules)
        run: python3 scripts/patch-wrangler.py

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: bun run deploy
